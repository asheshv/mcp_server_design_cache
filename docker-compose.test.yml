services:
  test_db:
    image: pgvector/pgvector:pg18
    container_name: mcp_test_postgres
    environment:
      POSTGRES_DB: design_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: testpassword
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d design_db"]
      interval: 2s
      retries: 10
    tmpfs:
      - /var/lib/postgresql/data
