services:
  mcp_db:
    image: pgvector/pgvector:pg18
    container_name: mcp_postgres
    environment:
      POSTGRES_DB: design_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    ports:
      # Bind to localhost only to prevent network exposure (SEC-11)
      - "127.0.0.1:5432:5432"
    volumes:
      # Correct mount path for PostgreSQL data directory (SEC-12)
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d design_db"]
      interval: 5s
      retries: 5

  mcp-server:
    build: .
    container_name: mcp_server
    depends_on:
      mcp_db:
        condition: service_healthy
    environment:
      - DB_HOST=mcp_db
      - DB_READ_PASS=${DB_READ_PASS:?Set DB_READ_PASS in .env}
      - DB_WRITE_PASS=${DB_WRITE_PASS:?Set DB_WRITE_PASS in .env}
    stdin_open: true
    tty: true

volumes:
  postgres_data:
